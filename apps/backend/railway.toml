[build]
  builder = "DOCKERFILE"
  dockerfilePath = "apps/backend/Dockerfile"

[deploy]
  startCommand = "node dist/server.js"
  healthcheckPath = "/health"
  healthcheckTimeout = 30
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 5
  sleepApplication = false

[[deploy.envVars]]
  name = "NODE_ENV"
  value = "production"

[[deploy.envVars]]
  name = "TZ"
  value = "Asia/Karachi"
