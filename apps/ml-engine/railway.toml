[build]
  builder = "DOCKERFILE"
  dockerfilePath = "apps/ml-engine/Dockerfile"

[deploy]
  startCommand = "uvicorn main:app --host 0.0.0.0 --port 8001"
  healthcheckPath = "/health"
  healthcheckTimeout = 60
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3

[[deploy.envVars]]
  name = "TZ"
  value = "Asia/Karachi"
